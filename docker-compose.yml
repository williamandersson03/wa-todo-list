services:
  app:
    build: .
    env_file:
      - .env
    environment:
      - SESSION_SECURE_COOKIE=true
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2.8
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
