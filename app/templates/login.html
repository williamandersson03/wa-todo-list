{% extends "base.html" %}
{% block content %}
<section class="panel auth-panel clean-auth">
  <h1>Login</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="/login" class="stack auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}" />
    <label>Email
      <input type="email" name="email" required autocomplete="email" />
    </label>
    <label>Password
      <input type="password" name="password" required autocomplete="current-password" />
    </label>
    <button class="btn btn-inverse auth-submit" type="submit">Login</button>
  </form>
  <p class="muted">No account? <a href="/register">Register</a></p>
</section>
{% endblock %}
